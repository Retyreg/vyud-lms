name: Deploy Backend to Fly.io

# Auto-deploys the backend to Fly.io when backend code or fly config changes on main.
# Fly.io never sleeps → надёжная альтернатива Render free tier.
#
# Требования (GitHub → Settings → Secrets → Actions):
#   FLY_API_TOKEN  — получить командой: fly auth token

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "fly.toml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: fly-deploy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy backend
        run: flyctl deploy --remote-only --wait-timeout 180
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
