# docker-compose.yml — Local development environment
# Mirrors production AWS stack: PostgreSQL + MongoDB (+ mock FCM via app)
# Usage:
#   docker compose up           # start all services
#   docker compose up backend   # start only backend
#   docker compose down -v      # stop and remove volumes

services:
  # ── PostgreSQL (core data) ─────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vyudlms
      POSTGRES_USER: vyudlms
      POSTGRES_PASSWORD: vyudlms_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vyudlms"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MongoDB (checklist JSON / media metadata) ──────────────────────────────
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://vyudlms:vyudlms_dev@postgres:5432/vyudlms
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      SECRET_KEY: ${SECRET_KEY:-dev_secret_change_in_production}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app  # hot-reload in dev
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Next.js Frontend ───────────────────────────────────────────────────────
  frontend:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: sh -c "npm install && npm run dev"
    depends_on:
      - backend

volumes:
  postgres_data:
  mongo_data:
